name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            artifact: wheels-linux
            maturin-args: ""
          - runner: windows-latest
            artifact: wheels-windows
            maturin-args: ""
          - runner: macos-latest
            artifact: wheels-macos
            maturin-args: "--target universal2-apple-darwin"

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # Native build with abi3-py312: one wheel per platform works on Python 3.12–3.14+.
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          prune-cache: false

      - name: Set up Python 3.14
        run: uv python install 3.14

      - name: Build wheel
        run: uv run maturin build --release --out dist --find-interpreter ${{ matrix.maturin-args }}
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist

  publish:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6

      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: List artifacts
        run: ls -la dist

      - name: Publish to PyPI
        run: uv publish dist/*
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
