name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.12", "3.14"]
        exclude:
          # Keep matrix lean: one OS per older/newer Python.
          - os: windows-latest
            python-version: "3.12"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          prune-cache: false

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies (maturin builds PyO3 extension)
        run: uv sync --group dev
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy src

      - name: Pytest
        run: uv run pytest

      - name: Pytest with native disabled
        run: uv run pytest -k native_disabled
        env:
          BOLTRA_DISABLE_NATIVE: "1"

      - name: Cargo test
        run: cargo test --workspace
